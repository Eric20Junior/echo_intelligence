# Roadmap Phase 6 packaging build. The Linux job's steps are exactly what was
# run and verified manually during development (see docs/roadmap.md's Phase 6
# section) — `npm test` then `npm run package`, nothing CI-specific. The
# windows-latest/macos-latest jobs run the identical `npm run package` script
# (scripts/package.js already branches on process.platform for the OS-specific
# SEA/codesign steps), but have NOT been executed on those runners yet — this
# workflow itself is the first real attempt, flagged as unverified until it's
# actually been run and its artifacts smoke-tested on those OSes.
#
# Pushing a tag matching v* additionally zips each OS's dist/ folder and
# publishes them to a GitHub Release named after the tag — that's what the
# one-line install.sh/install.ps1 scripts (docs/install.md) download.
name: package

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Each OS is an independent verification target (that's the whole point of
      # this matrix — Windows/macOS were unverified until this workflow actually
      # ran). Default fail-fast would cancel the other two the moment any one
      # OS fails, hiding whether they'd have passed.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # windows-latest runners now ship a preview Visual Studio install
      # alongside the stable one; the node-gyp bundled with npm/Node 20 can't
      # parse that preview's version string and crashes VS auto-detection
      # (confirmed directly: `npm ci` failed trying to build better-sqlite3
      # from source after finding no prebuilt binary for this Node/arch combo).
      # A newer node-gyp handles this fine — install one and point npm at it.
      - name: Work around node-gyp/VS-preview detection bug (Windows)
        if: matrix.name == 'windows'
        shell: bash
        run: |
          npm install -g node-gyp@latest
          npm config set node_gyp "$(npm prefix -g)/node_modules/node-gyp/bin/node-gyp.js"

      - run: npm ci

      # Detection pipeline tests are pure regex/logic, no network or native-asset
      # dependency — safe to run on every OS as a smoke check before packaging.
      - run: npm test

      # scripts/package.js deliberately does NOT fetch the local-LLM-fallback
      # model itself (see its header comment) — a CI runner starts with an empty
      # models/ dir every time, so it must be fetched explicitly before packaging.
      - run: node scripts/download-model.mjs

      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: echo-intelligence-${{ matrix.name }}
          path: backend/dist/

      - name: Zip release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.name }}" = "windows" ]; then
            powershell -Command "Compress-Archive -Path * -DestinationPath ../../echo-intelligence-${{ matrix.name }}.zip"
          else
            zip -r ../../echo-intelligence-${{ matrix.name }}.zip .
          fi

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: echo-intelligence-${{ matrix.name }}.zip
          draft: false
          prerelease: false
